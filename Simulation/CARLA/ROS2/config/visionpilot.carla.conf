# VisionPilot configuration — CARLA drive (shared by CARLA 0.9.16 and 0.10).
#
# CARLA integration only; VisionPilot/ stays pristine. The drive bind-mounts this file
# (read-only) over /workspace/VisionPilot/config/vision_pilot.conf — the fixed
# CWD-relative path the binary loads (the app's loader ignores --config). See README.md.
# Requires a build with -DENABLE_ROS2_INTERFACE=ON.

# ─── Input source ────────────────────────────────────────────────────────────
# CARLA publishes the camera natively over --ros2; topic set in vision_pilot_ros2.conf.
source.mode             = ros2

# ─── ONNX models ─────────────────────────────────────────────────────────────
# GPU inference for a live drive.
engine.provider     = cuda
engine.device_id    = 0
engine.cache_dir    = ~/.cache/vp_cuda
engine.workspace_gb = 1.0

model.precision    = fp32

# ─── Vehicle ─────────────────────────────────────────────────────────────────
# CARLA-overlay values — they MASK the in-tree VisionPilot defaults for the sim drive.
speed_limit      = 10.0   # m/s — lateral MPC is speed-invariant (arc-length domain)
Lf               = 1.335  # CARLA lincoln.mkz front axle to CoG (m)

# ─── GUI ─────────────────────────────────────────────────────────────────────
# MUST be true for a live drive — else the VisionPilot window opens blank/frozen.
visualization_on = true
